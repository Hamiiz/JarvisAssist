# fly.toml app configuration file for jarvisassist
# See https://fly.io/docs/reference/configuration/ for information.

app = 'jarvisassist'
primary_region = 'ams'

[build]

# Keep the bot process always alive (it's a long-running daemon, not a web server)
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

# Persistent volume for SQLite database (so data survives deploys)
[[mounts]]
  source = 'bot_data'
  destination = '/app/data'
  initial_size = '1gb'
