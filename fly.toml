# fly.toml app configuration file for jarvisassist
# See https://fly.io/docs/reference/configuration/ for information.

app = 'jarvisassist'
primary_region = 'ams'

[build]

[env]

# Keep the bot process always alive
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

# Explicit deploy strategy: immediate replacement
[deploy]
  strategy = 'immediate'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
