# fly.toml app configuration file for jarvisassist
# See https://fly.io/docs/reference/configuration/ for information.

app = 'jarvisassist'
primary_region = 'ams'

[build]

[env]
  # DB stored inside the mounted volume so it survives deploys
  DB_PATH = '/app/data/bot.db'

# Keep the bot process always alive (it's a long-running daemon, not a web server)
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '30s'
    interval = '15s'
    method = 'GET'
    timeout = '10s'
    path = '/'

# Explicit deploy strategy: only 1 machine, no rolling deploy
# (SQLite volume can only be attached to 1 machine at a time)
[deploy]
  strategy = 'immediate'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

# Persistent volume for SQLite database (so data survives deploys)
[[mounts]]
  source = 'bot_data'
  destination = '/app/data'
  initial_size = '1gb'
